pk = ["id"]

[tables.server_registry.columns.id]
type = "text_field"
comment = "Human-readable server identifier (e.g. python-1, zig-1)"

[tables.server_registry.columns.host]
type = "text_field"
comment = "Hostname or IP address"

[tables.server_registry.columns.port]
type = "int"

[tables.server_registry.columns.version]
type = "text_field"
comment = "Server version string"

[tables.server_registry.columns.server_type]
type = "server_type"

[tables.server_registry.columns.status]
type = "server_status"

[tables.server_registry.columns.max_sessions]
type = "int"

[tables.server_registry.columns.active_sessions]
type = "int"
default = "0"

[tables.server_registry.columns.last_heartbeat]
type = "timestamp_no_default"

[tables.server_registry.columns.registered_at]
type = "timestamp"

[tables.server_registry.indexes.idx_server_registry_status]
columns = ["status"]

[tables.server_registry.indexes.idx_server_registry_server_type]
columns = ["server_type"]

# -- Session --

[tables.session]
comment = "Multiplayer game sessions (lobbies). Tracks room code, player cap, and lifecycle."

[tables.session.columns.id]
type = "id"

[tables.session.columns.game_id]
type = "ref"

[tables.session.columns.status]
type = "session_status"

[tables.session.columns.room_code]
type = "text_field"

[tables.session.columns.max_players]
type = "int"

[tables.session.columns.config]
type = "json"
comment = "Game-specific configuration for this session"

[tables.session.columns.result]
type = "jsonb_nullable"
nullable = true
comment = "Game result data set when session ends"

[tables.session.columns.created_at]
type = "timestamp"

[tables.session.columns.started_at]
type = "timestamp_optional"

[tables.session.columns.ended_at]
type = "timestamp_optional"

[tables.session.columns.server_id]
type = "text_field"
nullable = true
comment = "ID of the server hosting this session. NULL for sessions created before fleet routing."

[tables.session.fks.fk_session_game]
columns = ["game_id"]
ref_table = "game_catalog"
ref_columns = ["id"]
on_delete = "CASCADE"

[tables.session.fks.fk_session_server]
columns = ["server_id"]
ref_table = "server_registry"
ref_columns = ["id"]
on_delete = "SET NULL"

[tables.session.indexes.idx_session_game]
columns = ["game_id"]

[tables.session.indexes.idx_session_room_code]
columns = ["room_code"]

[tables.session.indexes.idx_session_status]
columns = ["status"]

[tables.session.indexes.idx_session_server_id]
columns = ["server_id"]

# -- Session Participant --

[tables.session_participant]
comment = "Players in a game session with their role."
pk = ["session_id", "player_id"]

[tables.session_participant.columns.session_id]
type = "ref"

[tables.session_participant.columns.player_id]
type = "ref"

[tables.session_participant.columns.role]
type = "session_role"

[tables.session_participant.columns.joined_at]
type = "timestamp"

[tables.session_participant.fks.fk_session_participant_session]
columns = ["session_id"]
ref_table = "session"
ref_columns = ["id"]
